name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]          # deploy only on main branch merges
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  REGISTRY:       ghcr.io
  IMAGE_NAME:     ${{ github.repository }}
  AZURE_APP_NAME: fifa2026-predictor
  AZURE_RG:       rg-fifa2026

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:        ${{ env.AZURE_RG }}
          containerAppName:     ${{ env.AZURE_APP_NAME }}
          imageToDeploy:        ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environmentVariables: |
            FOOTBALL_DATA_API_KEY=secretref:football-data-api-key
