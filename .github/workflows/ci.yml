name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true          # pull Git LFS model files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 src/ app/ scripts/ --max-line-length=110 --ignore=E501,W503

      - name: Smoke-test simulation engine
        run: |
          python -W ignore -c "
          import sys; sys.path.insert(0, '.')
          from src.simulate import predict_win_prob, _load_models
          _load_models()
          p = predict_win_prob('Argentina', 'France')
          assert abs(sum(p) - 1.0) < 1e-6, f'Probabilities do not sum to 1: {p}'
          print('predict_win_prob OK:', [f\"{x:.3f}\" for x in p])
          "

      - name: Smoke-test group predictor
        run: |
          python -W ignore -c "
          import sys; sys.path.insert(0, '.')
          from src.group_predictor import run_group_simulations
          r = run_group_simulations('A', n=200)
          assert len(r['predicted_order']) == 4
          assert all(0 <= v <= 1 for v in r['qualify_probs'].values())
          print('group_predictor OK — predicted order:', r['predicted_order'])
          "

      - name: Smoke-test live scores (no API key — should return empty dict)
        run: |
          python -c "
          from src.live_scores import get_live_scores, is_api_configured
          assert not is_api_configured(), 'API key should not be set in CI'
          result = get_live_scores()
          assert result == {}, f'Expected empty dict, got: {result}'
          print('live_scores OK — returns empty dict without key')
          "

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Docker image
        run: docker build -t fifa2026-predictor:ci .

      - name: Verify image starts
        run: |
          docker run --rm -d --name wc2026_test -p 8501:8501 \
            fifa2026-predictor:ci
          sleep 10
          curl -f http://localhost:8501/_stcore/health || \
            (docker logs wc2026_test && exit 1)
          docker stop wc2026_test
